name: Build macOS Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Validate Python sources
        run: python -m py_compile app.py app.pyw

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            VERSION="v1.0.0"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate macOS icon
        shell: bash
        run: |
          mkdir -p build/icon.iconset
          sips -z 16 16 assets/app_icon.png --out build/icon.iconset/icon_16x16.png
          sips -z 32 32 assets/app_icon.png --out build/icon.iconset/icon_16x16@2x.png
          sips -z 32 32 assets/app_icon.png --out build/icon.iconset/icon_32x32.png
          sips -z 64 64 assets/app_icon.png --out build/icon.iconset/icon_32x32@2x.png
          sips -z 128 128 assets/app_icon.png --out build/icon.iconset/icon_128x128.png
          sips -z 256 256 assets/app_icon.png --out build/icon.iconset/icon_128x128@2x.png
          sips -z 256 256 assets/app_icon.png --out build/icon.iconset/icon_256x256.png
          sips -z 512 512 assets/app_icon.png --out build/icon.iconset/icon_256x256@2x.png
          sips -z 512 512 assets/app_icon.png --out build/icon.iconset/icon_512x512.png
          cp assets/app_icon.png build/icon.iconset/icon_512x512@2x.png
          iconutil -c icns build/icon.iconset -o assets/app_icon.icns

      - name: Configure private support endpoint
        shell: bash
        env:
          MARRIAGE_MANAGER_SUPPORT_URL: ${{ secrets.MARRIAGE_MANAGER_SUPPORT_URL }}
          MARRIAGE_MANAGER_VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ -n "$MARRIAGE_MANAGER_SUPPORT_URL" ]; then
            printf '%s' "$MARRIAGE_MANAGER_SUPPORT_URL" > support_endpoint.txt
          fi
          if [ -n "$MARRIAGE_MANAGER_VERSION" ]; then
            printf '%s' "$MARRIAGE_MANAGER_VERSION" > version.txt
          fi

      - name: Build macOS app
        shell: bash
        run: |
          ADD_DATA_ARGS=()
          if [ -f support_endpoint.txt ]; then
            ADD_DATA_ARGS+=(--add-data "support_endpoint.txt:.")
          fi
          if [ -f version.txt ]; then
            ADD_DATA_ARGS+=(--add-data "version.txt:.")
          fi
          pyinstaller \
            --noconfirm \
            --clean \
            --windowed \
            --name MarriageExpensesManager \
            --icon assets/app_icon.icns \
            --add-data "assets:assets" \
            "${ADD_DATA_ARGS[@]}" \
            --hidden-import PIL._tkinter_finder \
            --hidden-import tkinterdnd2 \
            --hidden-import openpyxl \
            --hidden-import reportlab \
            --hidden-import arabic_reshaper \
            --hidden-import bidi.algorithm \
            app.pyw

      - name: Package macOS app
        shell: bash
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/MarriageExpensesManager.app" \
            "dist/MarriageExpensesManager_macOS_${{ steps.version.outputs.version }}.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MarriageExpensesManager-macOS
          path: dist/MarriageExpensesManager_macOS_*.zip

      - name: Attach file to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MarriageExpensesManager_macOS_*.zip
